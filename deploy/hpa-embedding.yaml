# HorizontalPodAutoscaler for the embedding worker.
#
# Phase 8 Task 16. The embedding service is the Stage 3 gRPC
# embedder. The Python service exposes Prometheus metrics
# (embedding_requests_total, embedding_duration_seconds,
# embedding_queue_depth) on a sidecar HTTP port (default 9090) —
# see services/embedding/server.py.
#
# Service / container references:
#   docker-compose.yml service: `embedding`, gRPC :50052
#   metrics scraping address:   http://embedding:9090/metrics
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: embedding
  labels:
    app.kubernetes.io/name: embedding
    app.kubernetes.io/part-of: hunting-fishball
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: embedding
  minReplicas: 2
  maxReplicas: 16
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 85
    - type: Pods
      pods:
        metric:
          name: embedding_queue_depth
        target:
          type: AverageValue
          averageValue: "20"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
        - type: Percent
          value: 25
          periodSeconds: 120
