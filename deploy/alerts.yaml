# Prometheus alerting rules for hunting-fishball / context-engine.
#
# Round-4 Task 10: production-grade alert rules covering ingestion
# health, retrieval latency, DLQ rate, source health, and pipeline
# stage anomalies. The file format is the standard Prometheus
# Operator PrometheusRule manifest so it can be applied directly
# via kubectl in environments running prometheus-operator.
#
# Alert lifecycle conventions:
#   * `severity: critical` → page; user-visible breakage.
#   * `severity: warning`  → ticket; SLO at risk but service still up.
#   * `severity: info`     → dashboard; trend monitoring only.
#
# Every alert includes:
#   * `summary`     — single-line headline for the pager.
#   * `description` — multi-line context with hints for triage.
#   * `runbook_url` — pointer into docs/RUNBOOKS.md (placeholder
#                     until the runbook docs land).

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: context-engine-alerts
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: context-engine
    app.kubernetes.io/component: alerts
spec:
  groups:
    # -------------------------------------------------------------
    # Ingestion: Kafka consumer health
    # -------------------------------------------------------------
    - name: context-engine.ingestion
      interval: 30s
      rules:
        - alert: IngestionLagHigh
          expr: max by (topic, group) (context_engine_kafka_consumer_lag) > 10000
          for: 5m
          labels:
            severity: critical
            service: context-engine
          annotations:
            summary: "Kafka consumer lag > 10k for 5m"
            description: |
              Consumer group {{ $labels.group }} has been more than 10,000
              messages behind on topic {{ $labels.topic }} for over 5 minutes.
              Verify ingest pod count, broker health, and parse/embed
              gRPC service availability.
            runbook_url: "https://docs/RUNBOOKS.md#ingestion-lag-high"

        - alert: IngestionLagSustained
          expr: max by (topic, group) (context_engine_kafka_consumer_lag) > 50000
          for: 15m
          labels:
            severity: critical
            service: context-engine
          annotations:
            summary: "Kafka consumer lag > 50k for 15m"
            description: |
              Catastrophic ingestion stall. Lag exceeds 50k for 15 minutes —
              capacity is insufficient for the inbound message rate.
              Page the on-call and either scale ingest or pause source
              ingestion until the backlog drains.
            runbook_url: "https://docs/RUNBOOKS.md#ingestion-lag-sustained"

    # -------------------------------------------------------------
    # Pipeline: dead-letter queue
    # -------------------------------------------------------------
    - name: context-engine.dlq
      interval: 30s
      rules:
        - alert: DLQRateHigh
          expr: sum(rate(context_engine_dlq_messages_total[5m])) > 1
          for: 5m
          labels:
            severity: warning
            service: context-engine
          annotations:
            summary: "DLQ rate > 1 msg/s for 5m"
            description: |
              The pipeline is dead-lettering more than one message per
              second on average. Inspect the most recent DLQ rows in
              the admin UI and check connector / parser / embedding
              service health.
            runbook_url: "https://docs/RUNBOOKS.md#dlq-rate-high"

        # Round-13 Task 4: long-tail DLQ row alert. Fires when the
        # oldest unresolved DLQ row has been waiting longer than 1
        # hour. The auto-replay worker handles transient failures
        # within minutes; an hour-old row is almost certainly a
        # poison message awaiting human acknowledgement.
        - alert: DLQAgeHigh
          expr: context_engine_dlq_oldest_message_age_seconds > 3600
          for: 5m
          labels:
            severity: warning
            service: context-engine
          annotations:
            summary: "DLQ oldest row > 1h"
            description: |
              The oldest unresolved row on dlq_messages has been
              sitting for more than an hour. The auto-replay worker
              recycles transient failures inside minutes; rows that
              survive that long are almost always poison messages
              waiting for a human. Replay, fix, or purge via the
              admin UI.
            runbook_url: "https://docs/RUNBOOKS.md#dlq-age-high"

    # -------------------------------------------------------------
    # API: retrieval latency
    # -------------------------------------------------------------
    - name: context-engine.api
      interval: 30s
      rules:
        - alert: RetrievalP95High
          expr: |
            histogram_quantile(
              0.95,
              sum by (le, path) (rate(context_engine_api_request_duration_seconds_bucket{path=~"/v1/retrieval.*"}[5m]))
            ) > 0.5
          for: 10m
          labels:
            severity: warning
            service: context-engine
          annotations:
            summary: "Retrieval p95 latency > 500ms"
            description: |
              p95 retrieval latency is above 500ms on path {{ $labels.path }}.
              Inspect Qdrant pool saturation, BM25 index size, and
              policy resolver cache hit rate.
            runbook_url: "https://docs/RUNBOOKS.md#retrieval-p95-high"

        - alert: RetrievalP99High
          expr: |
            histogram_quantile(
              0.99,
              sum by (le, path) (rate(context_engine_api_request_duration_seconds_bucket{path=~"/v1/retrieval.*"}[5m]))
            ) > 1.5
          for: 10m
          labels:
            severity: critical
            service: context-engine
          annotations:
            summary: "Retrieval p99 latency > 1.5s"
            description: |
              p99 retrieval latency exceeds the SLO. Check downstream
              backend health and consider enabling degraded fallback.
            runbook_url: "https://docs/RUNBOOKS.md#retrieval-p99-high"

    # -------------------------------------------------------------
    # Pipeline: per-stage duration anomalies
    # -------------------------------------------------------------
    - name: context-engine.pipeline
      interval: 30s
      rules:
        - alert: PipelineStageSlow
          expr: |
            histogram_quantile(
              0.95,
              sum by (stage, le) (rate(context_engine_pipeline_stage_duration_seconds_bucket[5m]))
            ) > 30
          for: 10m
          labels:
            severity: warning
            service: context-engine
          annotations:
            summary: "Pipeline stage {{ $labels.stage }} p95 > 30s"
            description: |
              Stage {{ $labels.stage }} p95 has exceeded 30s for 10 minutes.
              Healthy stages typically sit under 5s. Inspect gRPC
              backend health and storage write contention.
            runbook_url: "https://docs/RUNBOOKS.md#pipeline-stage-slow"

    # -------------------------------------------------------------
    # Source health: connector errors
    # -------------------------------------------------------------
    - name: context-engine.sources
      interval: 60s
      rules:
        - alert: SourceUnhealthy
          # source-health gauges are populated by the
          # internal/admin/health package. The alert fires on the
          # error_count rolling counter.
          expr: max by (tenant_id, source_id) (context_engine_source_error_count) > 25
          for: 10m
          labels:
            severity: warning
            service: context-engine
          annotations:
            summary: "Source {{ $labels.source_id }} error_count > 25"
            description: |
              Connector for tenant={{ $labels.tenant_id }}
              source={{ $labels.source_id }} has accumulated more
              than 25 errors over the rolling window. Check the
              source's Health page for the most recent failure
              reason and rotate credentials if relevant.
            runbook_url: "https://docs/RUNBOOKS.md#source-unhealthy"

    # -------------------------------------------------------------
    # Round-11 Task 11: chunk quality / cache / credentials / GORM
    # -------------------------------------------------------------
    - name: context-engine.round11
      interval: 30s
      rules:
        - alert: ChunkQualityScoreDropped
          # Avg score drops below 0.5 over 15 minutes — connector or
          # chunker regression. The gauge is the cluster-wide rolling
          # average emitted by scoreAndRecordBlocks.
          expr: avg_over_time(context_engine_chunk_quality_score_avg[15m]) < 0.5
          for: 15m
          labels:
            severity: warning
            service: context-engine
          annotations:
            summary: "Average chunk quality score < 0.5 over 15m"
            description: |
              The cluster-wide average chunk quality score has been
              under 0.5 for 15 minutes. Inspect recent connector
              changes and the ChunkScorer thresholds; a regression
              here directly degrades retrieval relevance.
            runbook_url: "https://docs/RUNBOOKS.md#chunk-quality-dropped"

        - alert: CacheHitRateLow
          # Retrieval cache hit rate falls below 30% — either a
          # configuration regression, a sudden workload shift, or a
          # cache backend outage. The gauge tracks the live ratio.
          expr: avg_over_time(context_engine_cache_hit_rate[15m]) < 0.3
          for: 15m
          labels:
            severity: warning
            service: context-engine
          annotations:
            summary: "Retrieval cache hit rate < 0.3 over 15m"
            description: |
              Cache hit rate has been below 30% for 15 minutes.
              Investigate Redis health and the cache TTL config; a
              sustained low hit rate inflates p95 latency by 3-5x.
            runbook_url: "https://docs/RUNBOOKS.md#cache-hit-rate-low"

        - alert: CredentialHealthDegraded
          # Some source has credential_valid=false for >1h. The
          # gauge counts how many sources are currently invalid;
          # any value >0 sustained for an hour pages.
          expr: context_engine_credential_invalid_sources > 0
          for: 1h
          labels:
            severity: warning
            service: context-engine
          annotations:
            summary: "One or more sources have credential_valid=false for >1h"
            description: |
              The credential health worker has flagged at least one
              source as invalid for more than an hour. Inspect the
              Credential Health page (admin portal) and rotate the
              affected secret.
            runbook_url: "https://docs/RUNBOOKS.md#credential-health-degraded"

        - alert: GORMStoreLatencyHigh
          # GORM query p95 exceeds 200ms over 5 minutes. The
          # retrieval handler degrades gracefully on lookup errors
          # but high latency without errors still blows the request
          # budget.
          expr: histogram_quantile(0.95, sum by (le, store) (rate(context_engine_gorm_query_duration_seconds_bucket[5m]))) > 0.2
          for: 5m
          labels:
            severity: warning
            service: context-engine
          annotations:
            summary: "GORM store p95 latency > 200ms over 5m"
            description: |
              GORM-backed admin store {{ $labels.store }} p95 latency
              is over 200ms. Inspect Postgres connection pool and
              query plans; the retrieval handler will start falling
              back to defaults if errors follow.
            runbook_url: "https://docs/RUNBOOKS.md#gorm-store-latency-high"

    # -------------------------------------------------------------
    # Round-12 Task 1+2: gRPC circuit breakers + connection pools
    # -------------------------------------------------------------
    - name: context-engine.round12
      interval: 30s
      rules:
        - alert: GRPCCircuitBreakerOpen
          # Fires when any gRPC sidecar circuit breaker is in the
          # `open` state (gauge value 2) for more than 5 minutes.
          # An open breaker means the pool is short-circuiting every
          # call to the target host so traffic never reaches the
          # remote — the page wakes the on-call to investigate the
          # downstream Python sidecar.
          expr: max by (target) (context_engine_grpc_circuit_breaker_state) == 2
          for: 5m
          labels:
            severity: page
            service: context-engine
          annotations:
            summary: "gRPC circuit breaker open for {{ $labels.target }} > 5m"
            description: |
              The circuit breaker for gRPC target
              {{ $labels.target }} has been in the `open` state
              (gauge value 2) for over 5 minutes. Every dial against
              this target is short-circuited; check the sidecar's
              health endpoint and recent deploys/HPAs.
            runbook_url: "https://docs/RUNBOOKS.md#grpc-circuit-breaker-open"

        - alert: PostgresPoolSaturated
          # Fires when the live open-connection gauge passes 80% of
          # the configured CONTEXT_ENGINE_PG_MAX_OPEN ceiling. The
          # ceiling is injected as a recording rule constant by
          # ops/recording-rules.yaml; the threshold below is the
          # absolute alert level for a default deployment of 100.
          # Operators with non-default ceilings should override the
          # threshold via a kustomize patch.
          expr: context_engine_postgres_pool_open_connections > 80
          for: 5m
          labels:
            severity: warning
            service: context-engine
          annotations:
            summary: "Postgres pool > 80% saturation for 5m"
            description: |
              Postgres open connections have stayed above 80% of the
              configured CONTEXT_ENGINE_PG_MAX_OPEN ceiling for more
              than 5 minutes. Connection exhaustion is imminent —
              inspect long-running queries and pgbouncer health.
            runbook_url: "https://docs/RUNBOOKS.md#postgres-pool-saturated"

        - alert: RedisPoolSaturated
          # Fires when the Redis active (non-idle) connection gauge
          # exceeds 80 for 5 minutes — sustained pool saturation on
          # the default 100-conn ceiling. The semantic cache + rate
          # limiter share the pool so saturation hurts both the hot
          # retrieve path and connector backfills.
          expr: context_engine_redis_pool_active_connections > 80
          for: 5m
          labels:
            severity: warning
            service: context-engine
          annotations:
            summary: "Redis pool > 80% saturation for 5m"
            description: |
              Redis active connections have stayed above 80% of the
              configured pool ceiling for more than 5 minutes. The
              semantic cache and rate limiter share this pool, so
              saturation directly slows retrieval and backfill paths.
              Inspect Redis CPU + slow log; consider a connection
              pool bump or a cache-key TTL audit.
            runbook_url: "https://docs/RUNBOOKS.md#redis-pool-saturated"

        - alert: AuditIntegrityViolation
          # Round-14 Task 18 — fires the moment the integrity
          # worker reports any hash-chain mismatch. The counter is
          # monotonic so even a single increment is meaningful: the
          # append-only audit log has been tampered with or has
          # bit-rot, and an operator must inspect the affected
          # tenant immediately.
          expr: increase(context_engine_audit_integrity_violations_total[5m]) > 0
          for: 0m
          labels:
            severity: page
            service: context-engine
          annotations:
            summary: "Audit log integrity violation detected"
            description: |
              The audit-integrity background worker detected a
              hash-chain break or tampered row. Run
              GET /v1/admin/audit/integrity per tenant to identify
              the affected scope, snapshot the audit table for
              forensics, and engage the security on-call.
            runbook_url: "https://docs/RUNBOOKS.md#audit-integrity"

        - alert: EmbeddingFallbackRateHigh
          # Round-14 Task 18 — fires when the in-process fallback
          # embedder serves > 10% of embed requests over 15m. A
          # high fallback share means the gRPC sidecar is sick;
          # documents land with `degraded_embedding: true` and
          # retrieval quality suffers until the sidecar recovers
          # or the operator triggers a reindex.
          #
          # Denominator clamp_min(...,1) keeps the ratio
          # well-defined when embedding traffic is zero (during a
          # cold start the sidecar can be the only thing alive).
          expr: |
            (
              sum(rate(context_engine_embedding_fallback_total[15m]))
              /
              clamp_min(sum(rate(context_engine_embedding_requests_total[15m])), 1)
            ) > 0.10
          for: 5m
          labels:
            severity: warning
            service: context-engine
          annotations:
            summary: "Embedding fallback share > 10% over 15m"
            description: |
              The pipeline is falling back to the in-process Go
              embedder on more than 10% of embed calls. Documents
              indexed during this window carry
              `degraded_embedding: true`. Check the gRPC sidecar
              health, the stage-3 breaker state at
              GET /v1/admin/pipeline/breakers, and consider
              triggering a reindex once the sidecar recovers.
            runbook_url: "https://docs/RUNBOOKS.md#embedding-fallback"

        - alert: APIKeyGraceExpiringSoon
          # Round-14 Task 18 — fires when at least one API key is
          # within an hour of its grace_until and still in the
          # grace state. Lets the operator notify the tenant
          # before the sweeper transitions the row to expired.
          expr: context_engine_api_keys_grace_expiring_soon > 0
          for: 5m
          labels:
            severity: warning
            service: context-engine
          annotations:
            summary: "API key grace window expiring within 1h"
            description: |
              One or more rotated API keys are within one hour of
              the configured grace deadline. Either confirm the
              tenant has migrated to the new key or extend the
              grace window via the rotation endpoint. The sweeper
              will transition the row to `expired` after the
              deadline.

        - alert: SlowQueryRateHigh
          # Round-14 Task 18 — fires when the slow-query log
          # records > 5% of recent queries crossing the latency
          # threshold over 15m. A sustained slow-query share is
          # a leading indicator of vector-store saturation or
          # query-plan regression.
          expr: |
            (
              sum(rate(context_engine_retrieval_slow_queries_total[15m]))
              /
              clamp_min(sum(rate(context_engine_retrieval_requests_total[15m])), 1)
            ) > 0.05
          for: 5m
          labels:
            severity: warning
            service: context-engine
          annotations:
            summary: "Slow-query share > 5% over 15m"
            description: |
              More than 5% of retrieval queries crossed the slow
              threshold in the last 15 minutes. Inspect the slow
              log at GET /v1/admin/retrieval/slow-queries to see
              which queries / backends are the long pole.
