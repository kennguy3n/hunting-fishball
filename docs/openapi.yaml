openapi: 3.0.3
info:
  title: Hunting-Fishball Context Engine API
  description: |
    Public HTTP surface for the Hunting-Fishball multi-tenant
    knowledge / context platform. All `/v1/*` endpoints expect:

    - `X-Tenant-ID`: required, ULID-formatted tenant identifier
      (the auth middleware writes this into the gin context;
      handlers never read tenant identity from query / body).
    - `X-Actor-ID`: optional, ULID-formatted actor for audit logs.

    Liveness / readiness / metrics are served without auth on
    `/healthz`, `/readyz`, `/metrics`.
  version: 0.8.0
servers:
  - url: http://localhost:8080
    description: Local development
components:
  parameters:
    TenantHeader:
      name: X-Tenant-ID
      in: header
      required: true
      schema: { type: string, minLength: 26, maxLength: 26 }
    ActorHeader:
      name: X-Actor-ID
      in: header
      required: false
      schema: { type: string, minLength: 26, maxLength: 26 }
  schemas:
    Error:
      type: object
      properties:
        error: { type: string }
    RetrieveRequest:
      type: object
      required: [query]
      properties:
        query: { type: string }
        top_k: { type: integer, default: 10 }
        sources: { type: array, items: { type: string } }
        channels: { type: array, items: { type: string } }
        document_ids: { type: array, items: { type: string } }
        privacy_mode: { type: string, enum: [no-ai, internal, public, local-only] }
        skill_id: { type: string }
        device_tier: { type: string, enum: [low, mid, high] }
    RetrieveResponse:
      type: object
      properties:
        hits:
          type: array
          items: { $ref: '#/components/schemas/RetrieveHit' }
        policy: { $ref: '#/components/schemas/RetrievePolicy' }
        timings: { $ref: '#/components/schemas/RetrieveTimings' }
        trace_id: { type: string }
        prefer_local: { type: boolean }
        prefer_local_reason: { type: string }
    RetrieveHit:
      type: object
      properties:
        id: { type: string }
        score: { type: number }
        tenant_id: { type: string }
        source_id: { type: string }
        document_id: { type: string }
        block_id: { type: string }
        title: { type: string }
        uri: { type: string }
        privacy_label: { type: string }
        text: { type: string }
        connector: { type: string }
        metadata: { type: object, additionalProperties: true }
        privacy_strip: { type: object, additionalProperties: true }
    RetrievePolicy:
      type: object
      properties:
        applied: { type: array, items: { type: string } }
        degraded: { type: array, items: { type: string } }
        blocked_count: { type: integer }
        cache_hit: { type: boolean }
        privacy_mode: { type: string }
    RetrieveTimings:
      type: object
      properties:
        vector_ms: { type: integer }
        bm25_ms: { type: integer }
        graph_ms: { type: integer }
        memory_ms: { type: integer }
        merge_ms: { type: integer }
        rerank_ms: { type: integer }
    BatchRequest:
      type: object
      required: [requests]
      properties:
        requests:
          type: array
          maxItems: 32
          items: { $ref: '#/components/schemas/RetrieveRequest' }
        max_parallel: { type: integer, default: 8 }
    BatchResponse:
      type: object
      properties:
        results:
          type: array
          items:
            type: object
            properties:
              index: { type: integer }
              response: { $ref: '#/components/schemas/RetrieveResponse' }
              error: { type: string }
    Source:
      type: object
      properties:
        id: { type: string }
        tenant_id: { type: string }
        connector_type: { type: string }
        scopes: { type: array, items: { type: string } }
        config: { type: object, additionalProperties: true }
        status: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ConnectRequest:
      type: object
      required: [connector_type]
      properties:
        connector_type: { type: string }
        scopes: { type: array, items: { type: string } }
        config: { type: object, additionalProperties: true }
    ShardManifest:
      type: object
      properties:
        tenant_id: { type: string }
        shard_version: { type: integer }
        chunks_count: { type: integer }
        privacy_mode: { type: string }
        status: { type: string, enum: [building, ready, superseded] }
        created_at: { type: string, format: date-time }
    AuditLog:
      type: object
      properties:
        id: { type: string }
        tenant_id: { type: string }
        action: { type: string }
        resource_type: { type: string }
        resource_id: { type: string }
        actor_id: { type: string }
        payload: { type: object, additionalProperties: true }
        created_at: { type: string, format: date-time }
    DLQEntry:
      type: object
      properties:
        id: { type: string }
        tenant_id: { type: string }
        topic: { type: string }
        partition: { type: integer }
        offset: { type: integer }
        payload: { type: string }
        reason: { type: string }
        attempts: { type: integer }
        created_at: { type: string, format: date-time }
    SyncProgressItem:
      type: object
      properties:
        namespace_id: { type: string }
        discovered: { type: integer }
        processed: { type: integer }
        failed: { type: integer }
        percent_done: { type: number }
    SyncProgressResponse:
      type: object
      properties:
        tenant_id: { type: string }
        source_id: { type: string }
        items:
          type: array
          items: { $ref: '#/components/schemas/SyncProgressItem' }
    DashboardResponse:
      type: object
      # Round-11 Task 17: typed schema replaces the
      # additionalProperties stub. Matches admin.DashboardResponse
      # in internal/admin/dashboard_handler.go.
      properties:
        tenant_id: { type: string }
        sources:
          type: array
          items:
            type: object
            properties:
              source_id: { type: string }
              connector: { type: string }
              status: { type: string }
              last_synced_at: { type: string, format: date-time }
              chunk_count: { type: integer }
              error_count: { type: integer }
              credential_valid: { type: boolean }
        pipeline:
          $ref: '#/components/schemas/PipelineHealthReport'
        cache:
          type: object
          properties:
            hit_rate: { type: number, format: float }
            miss_count: { type: integer }
            hit_count: { type: integer }
    HealthResponse:
      type: object
      # Round-11 Task 17: matches b2c.HealthResponse.
      properties:
        status: { type: string, example: ok }
        time: { type: string, format: date-time }
        version: { type: string }
    PipelineStageHealth:
      type: object
      # Round-11 Task 17: matches admin.PipelineStageHealth.
      properties:
        stage: { type: string, enum: [fetch, parse, embed, store] }
        throughput: { type: number, format: float }
        avg_latency_ms: { type: number, format: float }
        p95_latency_ms: { type: number, format: float }
        retries: { type: number, format: float }
        queue_depth: { type: number, format: float }
        dlq_total: { type: number, format: float }
    PipelineHealthReport:
      type: object
      # Round-11 Task 17: matches admin.PipelineHealthReport.
      properties:
        stages:
          type: array
          items: { $ref: '#/components/schemas/PipelineStageHealth' }
    AuditListResponse:
      type: object
      # Round-11 Task 17: shape returned by /v1/admin/audit.
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/AuditLog' }
        next_page_token: { type: string }
    DLQListResponse:
      type: object
      # Round-11 Task 17.
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/DLQEntry' }
        next_page_token: { type: string }
    PolicyDraft:
      type: object
      # Round-11 Task 17.
      properties:
        id: { type: string }
        tenant_id: { type: string }
        author: { type: string }
        body: { type: object, additionalProperties: true }
        status: { type: string, enum: [draft, promoted, rejected] }
        created_at: { type: string, format: date-time }
    PolicyDraftList:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/PolicyDraft' }
    SourceList:
      type: object
      # Round-11 Task 17.
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Source' }
    ReindexRequest:
      type: object
      required: [tenant_id, source_id]
      properties:
        tenant_id: { type: string }
        source_id: { type: string }
        namespace_id: { type: string }
    Capabilities:
      type: object
      # Round-11 Task 17: typed schema matching b2c.Capabilities.
      properties:
        enabled_backends:
          type: array
          items: { type: string, enum: [vector, bm25, graph, memory] }
        privacy_modes:
          type: array
          items: { type: string, enum: [no-ai, local-only, local-api, hybrid, remote] }
        local_shard_sync: { type: boolean }
        privacy_strip: { type: boolean }
        device_first: { type: boolean }
        server_version: { type: string }

    # ----------------------------------------------------------------
    # Round-12 Task 10/11: typed response/request schemas covering
    # the long tail of admin endpoints that previously shipped
    # 'description: OK' or 'additionalProperties: true' stubs.
    # Schemas mirror the Go struct field names in internal/.
    # ----------------------------------------------------------------
    FeedbackRequest:
      type: object
      required: [query_id, chunk_id, relevant]
      properties:
        query_id: { type: string }
        chunk_id: { type: string }
        relevant: { type: boolean }
        note:     { type: string }
    FeedbackResponse:
      type: object
      properties:
        id:         { type: string }
        created_at: { type: string, format: date-time }
    EvalRunReport:
      type: object
      properties:
        suite_name:   { type: string }
        tenant_id:    { type: string }
        started_at:   { type: string, format: date-time }
        completed_at: { type: string, format: date-time }
        duration:     { type: integer, description: "nanoseconds" }
        k:            { type: integer }
        cases:
          type: array
          items: { type: object, additionalProperties: true }
        aggregate:
          type: object
          properties:
            precision_at_k: { type: number, format: float }
            recall_at_k:    { type: number, format: float }
            mrr:            { type: number, format: float }
            ndcg_at_k:      { type: number, format: float }
    SyncSchedule:
      type: object
      properties:
        tenant_id:        { type: string }
        source_id:        { type: string }
        cron:             { type: string }
        cadence:          { type: string }
        last_run_at:      { type: string, format: date-time }
        next_run_at:      { type: string, format: date-time }
        last_status:      { type: string, enum: [ok, error, never_run] }
        last_error:       { type: string }
        last_error_at:    { type: string, format: date-time }
    ModelEntry:
      type: object
      properties:
        id:           { type: string }
        family:       { type: string }
        quantization: { type: string }
        tier_floor:   { type: string }
        size_bytes:   { type: integer }
        hash:         { type: string }
    ModelCatalog:
      type: object
      properties:
        catalog_version: { type: integer, format: int64 }
        models:
          type: array
          items: { $ref: '#/components/schemas/ModelEntry' }
        eviction_config: { type: object, additionalProperties: true }
    CredentialHealth:
      type: object
      properties:
        tenant_id:                { type: string }
        source_id:                { type: string }
        credential_valid:         { type: boolean }
        credential_error:         { type: string }
        credential_checked_at:    { type: string, format: date-time }
    ExportJob:
      type: object
      properties:
        id:           { type: string }
        tenant_id:    { type: string }
        actor_id:     { type: string }
        status:       { type: string, enum: [pending, running, completed, failed] }
        download_url: { type: string }
        error:        { type: string }
        created_at:   { type: string, format: date-time }
        started_at:   { type: string, format: date-time }
        completed_at: { type: string, format: date-time }
    Experiment:
      type: object
      properties:
        tenant_id:              { type: string }
        experiment_name:        { type: string }
        status:                 { type: string, enum: [draft, running, paused, ended] }
        traffic_split_percent:  { type: integer }
        control_config:         { type: object, additionalProperties: true }
        variant_config:         { type: object, additionalProperties: true }
        start_at:               { type: string, format: date-time }
        end_at:                 { type: string, format: date-time }
        created_at:             { type: string, format: date-time }
        updated_at:             { type: string, format: date-time }
    ExperimentList:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Experiment' }
    ABTestArmResult:
      type: object
      properties:
        arm:                { type: string }
        count:              { type: integer }
        avg_latency_ms:     { type: number, format: float }
        avg_hit_count:      { type: number, format: float }
        cache_hit_percent:  { type: number, format: float }
        p50_latency_ms:     { type: number, format: float }
        p95_latency_ms:     { type: number, format: float }
    ABTestResultsResponse:
      type: object
      properties:
        experiment: { type: string }
        arms:
          type: array
          items: { $ref: '#/components/schemas/ABTestArmResult' }
    WarmCacheRequest:
      type: object
      required: [queries]
      properties:
        queries:
          type: array
          items: { type: string }
        actor_id: { type: string }
    WarmCacheResponse:
      type: object
      properties:
        queued:    { type: integer }
        skipped:   { type: integer }
        accepted:  { type: boolean }
    BulkSourceRequest:
      type: object
      required: [action, source_ids]
      properties:
        action: { type: string, enum: [pause, resume, disconnect] }
        source_ids:
          type: array
          items: { type: string }
    BulkSourceResult:
      type: object
      properties:
        source_id: { type: string }
        ok:        { type: boolean }
        error:     { type: string }
    BulkSourceResponse:
      type: object
      properties:
        action:  { type: string, enum: [pause, resume, disconnect] }
        total:   { type: integer }
        ok:      { type: integer }
        failed:  { type: integer }
        results:
          type: array
          items: { $ref: '#/components/schemas/BulkSourceResult' }
    SourceBucket:
      type: object
      properties:
        source_id: { type: string }
        count:     { type: integer }
        avg_score: { type: number, format: float }
        duplicate_count: { type: integer }
    ChunkQualityReport:
      type: object
      properties:
        tenant_id: { type: string }
        buckets:
          type: array
          items: { $ref: '#/components/schemas/SourceBucket' }
    LatencyBudget:
      type: object
      properties:
        tenant_id:        { type: string }
        max_latency_ms:   { type: integer }
        p95_target_ms:    { type: integer }
        notes:            { type: string }
        created_at:       { type: string, format: date-time }
        updated_at:       { type: string, format: date-time }
    CacheConfig:
      type: object
      properties:
        tenant_id:  { type: string }
        ttl_ms:     { type: integer }
        notes:      { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    SyncHistoryRow:
      type: object
      properties:
        id:             { type: string }
        tenant_id:      { type: string }
        source_id:      { type: string }
        sync_run_id:    { type: string }
        status:         { type: string, enum: [running, success, failed, cancelled] }
        docs_processed: { type: integer }
        docs_failed:    { type: integer }
        started_at:     { type: string, format: date-time }
        ended_at:       { type: string, format: date-time }
        error_message:  { type: string }
        duration_ms:    { type: integer, format: int64 }
    SyncHistoryList:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/SyncHistoryRow' }
    PinnedResult:
      type: object
      properties:
        id:            { type: string }
        tenant_id:     { type: string }
        query_pattern: { type: string }
        chunk_id:      { type: string }
        position:      { type: integer }
        created_at:    { type: string, format: date-time }
    PinnedResultList:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/PinnedResult' }
    ConnectorTemplate:
      type: object
      properties:
        id:             { type: string }
        tenant_id:      { type: string }
        connector_type: { type: string }
        default_config: { type: object, additionalProperties: true }
        description:    { type: string }
        created_at:     { type: string, format: date-time }
        updated_at:     { type: string, format: date-time }
    ConnectorTemplateList:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/ConnectorTemplate' }
    Synonyms:
      type: object
      description: "per-tenant synonyms: maps lhs token -> list of rhs token(s)."
      additionalProperties:
        type: array
        items: { type: string }
    NotificationPreference:
      type: object
      properties:
        id:         { type: string }
        tenant_id:  { type: string }
        event_type: { type: string }
        channel:    { type: string, enum: [webhook, email] }
        target:     { type: string }
        enabled:    { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    NotificationPreferenceList:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/NotificationPreference' }
    NotificationDeliveryLog:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              id:            { type: string }
              tenant_id:     { type: string }
              event_type:    { type: string }
              channel:       { type: string, enum: [webhook, email] }
              target:        { type: string }
              status:        { type: string, enum: [success, failure, retrying, dead_letter] }
              attempt:       { type: integer }
              error_message: { type: string }
              created_at:    { type: string, format: date-time }
    RateLimitStatus:
      type: object
      properties:
        tenant_id:      { type: string }
        source_id:      { type: string }
        current_tokens: { type: number, format: float }
        max_tokens:     { type: integer }
        effective_rate: { type: number, format: float }
        halve_count:    { type: integer }
        last_429_at:    { type: string, format: date-time }
        is_throttled:   { type: boolean }
    BatchRetrieveRequest:
      type: object
      required: [requests]
      properties:
        requests:
          type: array
          items: { $ref: '#/components/schemas/RetrieveRequest' }
        diversity: { type: number, format: float }
    StreamRetrieveRequest:
      type: object
      required: [query]
      properties:
        query:     { type: string }
        top_k:     { type: integer }
        explain:   { type: boolean }
        namespace: { type: string }
        privacy_mode: { type: string, enum: [no-ai, local-only, local-api, hybrid, remote] }
    CreateSourceRequest:
      type: object
      required: [tenant_id, name, connector_type]
      properties:
        tenant_id:      { type: string }
        name:           { type: string }
        connector_type: { type: string }
        config:         { type: object, additionalProperties: true }
        rate_limit:
          type: object
          properties:
            capacity:          { type: integer }
            refill_per_second: { type: number, format: float }
    PolicySimulateRequest:
      type: object
      required: [tenant_id, draft]
      properties:
        tenant_id: { type: string }
        draft:     { type: object, additionalProperties: true }
        sample_queries:
          type: array
          items: { type: string }
paths:
  /healthz:
    get:
      summary: Liveness probe.
      responses:
        '200': { description: OK }
  /readyz:
    get:
      summary: Readiness probe.
      responses:
        '200': { description: OK }
        '503': { description: Not ready }
  /metrics:
    get:
      summary: Prometheus metrics scrape endpoint.
      responses:
        '200': { description: OK, content: { text/plain: { schema: { type: string } } } }
  /v1/health:
    get:
      summary: B2C health summary.
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/HealthResponse' } } }
  /v1/capabilities:
    get:
      summary: B2C capabilities (enabled backends, privacy modes, feature flags).
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Capabilities' } } } }
  /v1/sync/schedule:
    get:
      summary: B2C sync schedule (with minimum-interval floors).
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { type: object, properties: { items: { type: array, items: { $ref: '#/components/schemas/SyncSchedule' } } } } } }
  /v1/retrieve:
    post:
      summary: Run a single retrieval (vector + BM25 + graph + memory fan-out).
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ActorHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RetrieveRequest' }
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/RetrieveResponse' } } }
        '400': { description: Bad request, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '401': { description: Missing tenant }
        '503': { description: Policy resolver unavailable }
  /v1/admin/rate-limit-status:
    get:
      summary: Round-12 Task 16 alias — see /v1/admin/sources/{id}/rate-limit-status.
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - in: query
          name: source_id
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/RateLimitStatus' } } } }
  /v1/admin/sources/{id}/rate-limit-status:
    get:
      summary: Inspect adaptive rate-limiter state for a source.
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/RateLimitStatus' } } } }
        '401': { description: Missing tenant }
  /v1/retrieve/batch:
    post:
      summary: Run multiple retrieves concurrently in one request.
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            # BatchRequest is the historical envelope; BatchRetrieveRequest
            # mirrors internal/retrieval.BatchRetrieveRequest.
            schema:
              oneOf:
                - { $ref: '#/components/schemas/BatchRequest' }
                - { $ref: '#/components/schemas/BatchRetrieveRequest' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/BatchResponse' } } } }
        '400': { description: Bad request }
        '413': { description: Batch too large }
  /v1/shards/{tenant_id}:
    get:
      summary: List shard manifests for a tenant.
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - in: path
          name: tenant_id
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
  /v1/shards/{tenant_id}/delta:
    get:
      summary: Delta shard manifest.
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - in: path
          name: tenant_id
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
  /v1/shards/{tenant_id}/coverage:
