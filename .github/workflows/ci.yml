name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  go:
    name: Go ${{ matrix.go-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25.x"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Install protoc
        env:
          PROTOC_VERSION: "25.3"
        run: |
          curl -sSLo /tmp/protoc.zip "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          sudo unzip -q -o /tmp/protoc.zip -d /usr/local
          protoc --version

      - name: go mod download
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: go test -race -cover
        run: go test -race -cover ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.5.0
          args: --timeout=5m

      - name: proto-gen check
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          export PATH="$PATH:$(go env GOPATH)/bin"
          for f in $(find proto -name '*.proto'); do
            protoc \
              --proto_path=proto \
              --go_out=proto --go_opt=paths=source_relative \
              --go-grpc_out=proto --go-grpc_opt=paths=source_relative \
              "$f"
          done
          if ! git diff --exit-code -- proto; then
            echo "Generated proto files are out of date. Run 'make proto-gen' and commit."
            exit 1
          fi

      - name: build binaries
        run: |
          mkdir -p bin
          go build -o bin/context-engine-ingest ./cmd/ingest
          go build -o bin/context-engine-api    ./cmd/api

  e2e:
    name: e2e smoke
    runs-on: ubuntu-latest
    needs: go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Bring up storage plane
        run: docker compose up -d --wait

      - name: Wait for stack to settle
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:6333/healthz >/dev/null && \
               docker exec $(docker ps -qf name=hunting-fishball-postgres) pg_isready -U hf -d hunting_fishball >/dev/null 2>&1; then
              echo "stack ready"; exit 0
            fi
            echo "waiting for stack... ($i/30)"; sleep 2
          done
          echo "stack did not become ready in time"
          docker compose ps
          exit 1

      - name: Run e2e smoke test
        env:
          E2E_ENABLED: "1"
          CONTEXT_ENGINE_DATABASE_URL: "host=localhost user=hf password=hf dbname=hunting_fishball port=5432 sslmode=disable"
          CONTEXT_ENGINE_QDRANT_URL: "http://localhost:6333"
        run: go test -tags=e2e -race -count=1 -timeout 5m ./tests/e2e/...

      - name: Tear down storage plane
        if: always()
        run: docker compose down -v
