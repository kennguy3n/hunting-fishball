name: CI

# ---------------------------------------------------------------
# CI is split into a fast lane (every PR, must pass) and a
# full lane (label-gated / push-to-main / nightly). The goal is
# to keep PR turnaround under ~1 minute while still running the
# expensive checks (docker compose stack, ML services, race +
# coverage suites) on a regular cadence.
#
#   Fast lane      gofmt, vet, lint, race+cover, build, python
#                  unit tests. Runs on every PR push.
#
#   Full lane      proto-gen check, e2e smoke (docker stack),
#                  Go ↔ Python integration. Runs on:
#                    - push to main (post-merge gate)
#                    - PR carrying the `full-ci` label
#                    - PR carrying the `run-integration` label
#                      (integration job only)
#                    - nightly cron (06:27 UTC)
#                    - manual workflow_dispatch
#
# Branch protection should require the `Required CI (fast lane)`
# aggregator job — adding new fast-lane checks just means adding
# them to its `needs:` list.
# ---------------------------------------------------------------

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, labeled, unlabeled]
  schedule:
    # Nightly full lane: catches regressions in heavy/integration
    # checks even if no PR carries the `full-ci` label.
    - cron: "27 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ===============================================================
  # Fast lane — runs on every PR, blocking
  # ===============================================================

  fast-go:
    name: Fast Go (gofmt + vet + lint + race+cover)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: go mod download
        run: go mod download

      - name: gofmt check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error title=gofmt::Files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test -race -cover
        run: go test -race -cover -count=1 ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.5.0
          args: --timeout=5m

      - name: build binaries
        run: |
          mkdir -p bin
          go build -o bin/context-engine-ingest ./cmd/ingest
          go build -o bin/context-engine-api    ./cmd/api

  fast-eval:
    name: Fast Eval (retrieval golden corpus)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: go mod download
        run: go mod download

      - name: Eval gate
        run: make eval

  fast-alerts:
    name: Fast alerts.yaml check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: go mod download
        run: go mod download

      - name: alerts-check
        run: make alerts-check

  fast-rollback-parity:
    name: Fast migration/rollback parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: go mod download
        run: go mod download

      - name: rollback parity tests
        run: go test -race -count=1 ./migrations/rollback/...

  fast-migrate-dry-run:
    # Round-12 Task 9: drive the migration runner in DryRun mode
    # against an ephemeral SQLite database so SQL syntax errors in
    # new migrations surface at PR time, not deploy time.
    name: Fast migrate-dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: go mod download
        run: go mod download

      - name: migrate-dry-run
        run: make migrate-dry-run

  fast-proto-check:
    name: Fast — proto-check (no codegen drift)
    # Round-10 Task 17: pin the proto-gen output as a fast-lane
    # gate. proto-check runs proto-gen and fails when the working
    # tree diverges from the committed stubs, so every PR is
    # required to keep proto/ in sync.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Install protoc
        env:
          PROTOC_VERSION: "25.3"
        run: |
          curl -sSLo /tmp/protoc.zip "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          sudo unzip -q -o /tmp/protoc.zip -d /usr/local
          protoc --version

      - name: proto-check
        run: make proto-check

  fast-python:
    name: Fast Python services unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install proto / test deps
        run: |
          python -m pip install --upgrade pip
          pip install grpcio==1.80.0 grpcio-tools==1.80.0 "protobuf>=6,<8" pytest "prometheus-client>=0.21,<1"

      - name: Generate Python proto stubs
        run: bash services/gen_protos.sh

      - name: Run unit tests
        run: cd services && python -m pytest -q --import-mode=importlib

  # Aggregator: branch protection should require this single check.
  # When you add a new fast-lane job, add it to `needs:` here.
  fast-required:
    name: Required CI (fast lane)
    runs-on: ubuntu-latest
    needs: [fast-go, fast-eval, fast-alerts, fast-rollback-parity, fast-migrate-dry-run, fast-proto-check, fast-python]
    if: always()
    steps:
      - name: Verify fast-lane jobs passed
        run: |
          set -e
          fail=0
          for r in \
            "${{ needs.fast-go.result }}" \
            "${{ needs.fast-eval.result }}" \
            "${{ needs.fast-alerts.result }}" \
            "${{ needs.fast-rollback-parity.result }}" \
            "${{ needs.fast-migrate-dry-run.result }}" \
            "${{ needs.fast-proto-check.result }}" \
            "${{ needs.fast-python.result }}"; do
            if [ "$r" != "success" ]; then
              fail=1
            fi
          done
          if [ "$fail" = "1" ]; then
            echo "::error::fast-go=${{ needs.fast-go.result }} fast-eval=${{ needs.fast-eval.result }} fast-alerts=${{ needs.fast-alerts.result }} fast-rollback-parity=${{ needs.fast-rollback-parity.result }} fast-migrate-dry-run=${{ needs.fast-migrate-dry-run.result }} fast-proto-check=${{ needs.fast-proto-check.result }} fast-python=${{ needs.fast-python.result }}"
            exit 1
          fi
          echo "fast lane green"

  # ===============================================================
  # Full lane — gated; only runs on push-to-main, the `full-ci`
  # label, the nightly cron, or workflow_dispatch
  # ===============================================================

  full-proto-gen:
    name: Full — proto-gen check
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'full-ci'))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Install protoc
        env:
          PROTOC_VERSION: "25.3"
        run: |
          curl -sSLo /tmp/protoc.zip "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          sudo unzip -q -o /tmp/protoc.zip -d /usr/local
          protoc --version

      - name: proto-gen check
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          export PATH="$PATH:$(go env GOPATH)/bin"
          for f in $(find proto -name '*.proto'); do
            protoc \
              --proto_path=proto \
              --go_out=proto --go_opt=paths=source_relative \
              --go-grpc_out=proto --go-grpc_opt=paths=source_relative \
              "$f"
          done
          if ! git diff --exit-code -- proto; then
            echo "::error title=stale proto::Generated proto files are out of date. Run 'make proto-gen' and commit."
            exit 1
          fi

  full-e2e:
    name: Full — e2e smoke
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'full-ci'))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Bring up storage plane
        run: docker compose up -d --wait

      - name: Wait for stack to settle
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:6333/healthz >/dev/null && \
               docker exec $(docker ps -qf name=hunting-fishball-postgres) pg_isready -U hf -d hunting_fishball >/dev/null 2>&1; then
              echo "stack ready"; exit 0
            fi
            echo "waiting for stack... ($i/30)"; sleep 2
          done
          echo "stack did not become ready in time"
          docker compose ps
          exit 1

      - name: Run e2e smoke test
        env:
          E2E_ENABLED: "1"
          CONTEXT_ENGINE_DATABASE_URL: "host=localhost user=hf password=hf dbname=hunting_fishball port=5432 sslmode=disable"
          CONTEXT_ENGINE_QDRANT_URL: "http://localhost:6333"
        run: go test -tags=e2e -race -count=1 -timeout 5m ./tests/e2e/...

      # Round-12 Task 7: tenant isolation smoke runs against the
      # live storage plane brought up above. Kept as a discrete
      # step so a failure here surfaces as "isolation regression"
      # rather than getting buried in the generic e2e suite.
      - name: Tenant isolation smoke
        env:
          E2E_ENABLED: "1"
          CONTEXT_ENGINE_DATABASE_URL: "host=localhost user=hf password=hf dbname=hunting_fishball port=5432 sslmode=disable"
          CONTEXT_ENGINE_QDRANT_URL: "http://localhost:6333"
        run: make test-isolation

      - name: Tear down storage plane
        if: always()
        run: docker compose down -v

  full-integration:
    name: Full — Go ↔ Python integration
    runs-on: ubuntu-latest
    needs: fast-python
    # Heavy ML image builds (Docling ~3 GB, sentence-transformers
    # +torch ~2 GB) and Mem0's external LLM dependency mean this job
    # can flake on the default GitHub-hosted runners. Treat it as a
    # signal job (continue-on-error) until we move it onto a self-
    # hosted runner with a warm image cache and an OPENAI_API_KEY.
    continue-on-error: true
    if: |
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && (
        contains(github.event.pull_request.labels.*.name, 'full-ci') ||
        contains(github.event.pull_request.labels.*.name, 'run-integration')
      ))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Build & start ML services
        run: |
          docker compose build docling embedding memory
          docker compose up -d --wait docling embedding memory falkordb

      - name: Wait for gRPC services
        run: |
          for port in 50051 50052 50053; do
            for i in $(seq 1 60); do
              if (echo > /dev/tcp/localhost/$port) >/dev/null 2>&1; then
                echo "port $port ready"; break
              fi
              echo "waiting for port $port... ($i/60)"; sleep 2
              if [ "$i" = "60" ]; then echo "port $port did not open"; exit 1; fi
            done
          done

      - name: Run Go integration tests
        env:
          DOCLING_TARGET: "localhost:50051"
          EMBEDDING_TARGET: "localhost:50052"
          MEMORY_TARGET: "localhost:50053"
          FALKORDB_ADDR: "localhost:6380"
        run: go test -tags=integration -race -count=1 -timeout 10m ./tests/integration/...

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ===============================================================
  # Round-10 Task 17: nightly-only heavy jobs. Each runs against
  # `schedule` and `workflow_dispatch`; PRs can opt in via the
  # `full-ci` label.
  # ===============================================================

  full-connector-smoke:
    name: Full — connector smoke
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'full-ci'))
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - name: go mod download
        run: go mod download
      - name: connector smoke
        run: make test-connector-smoke

  full-bench-e2e:
    name: Full — end-to-end P95 bench
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'full-ci'))
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - name: go mod download
        run: go mod download
      - name: bench-e2e
        run: make bench-e2e

  full-capacity-test:
    name: Full — capacity test
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'full-ci'))
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - name: go mod download
        run: go mod download
      - name: capacity test
        run: make capacity-test

  nightly-fuzz:
    name: Nightly — fuzz targets
    runs-on: ubuntu-latest
    # Fuzzing is wall-clock-heavy: 30s per target × N targets. Limit
    # to nightly cron + workflow_dispatch; PRs that need it can fire
    # workflow_dispatch by hand.
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - name: go mod download
        run: go mod download
      - name: make fuzz
        run: make fuzz
