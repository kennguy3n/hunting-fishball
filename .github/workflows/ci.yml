name: CI

# ---------------------------------------------------------------
# CI is split into a fast lane (every PR, must pass) and a
# full lane (label-gated / push-to-main / nightly). The goal is
# to keep PR turnaround under ~1 minute while still running the
# expensive checks (docker compose stack, ML services, race +
# coverage suites) on a regular cadence.
#
#   Fast lane      gofmt, vet, lint, race+cover, build, python
#                  unit tests. Runs on every PR push.
#
#   Full lane      proto-gen check, e2e smoke (docker stack),
#                  Go ↔ Python integration. Runs on:
#                    - push to main (post-merge gate)
#                    - PR carrying the `full-ci` label
#                    - PR carrying the `run-integration` label
#                      (integration job only)
#                    - nightly cron (06:27 UTC)
#                    - manual workflow_dispatch
#
# Branch protection should require the `Required CI (fast lane)`
# aggregator job — adding new fast-lane checks just means adding
# them to its `needs:` list.
# ---------------------------------------------------------------

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, labeled, unlabeled]
  schedule:
    # Nightly full lane: catches regressions in heavy/integration
    # checks even if no PR carries the `full-ci` label.
    - cron: "27 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

# Round-15 Task 14: cancel in-progress CI runs when a new commit
# lands on the same PR. Pushed PRs no longer queue stale CI runs.
# Non-PR events (push to `main`, nightly `schedule`, manual
# `workflow_dispatch`) are scoped per-SHA via `github.sha` so a
# new push or the nightly cron never cancels another non-PR run
# — `github.ref` would group them all under `refs/heads/main`.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  # ===============================================================
  # Fast lane — runs on every PR, blocking
  # ===============================================================

  # ----------------------------------------------------------------
  # Round-20/21 Task 24: detect which surfaces this PR actually
  # touches so the path-filtered connector + regression lanes can
  # skip themselves on doc-only / unrelated-only PRs. Push-to-main,
  # nightly cron, and manual workflow_dispatch force everything to
  # `true` so the gate stays honest on protected events. The
  # aggregator below treats `skipped` as `success` for these path-
  # filtered jobs.
  # ----------------------------------------------------------------
  detect-changes:
    name: Detect path-filtered changes
    runs-on: ubuntu-latest
    outputs:
      connector: ${{ steps.filter.outputs.connector }}
      regression: ${{ steps.filter.outputs.regression }}
    steps:
      - uses: actions/checkout@v4

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          # On push/schedule/dispatch, dorny still runs but lacks a
          # base ref to diff against — every filter resolves to
          # `true`, which is the safe default.
          filters: |
            connector:
              - 'internal/connector/**'
              - 'tests/integration/connector_*'
              - 'docs/runbooks/**'
              - 'cmd/api/main.go'
              - 'cmd/ingest/main.go'
            regression:
              - 'tests/regression/**'
              - 'internal/connector/**'
              - 'internal/pipeline/**'
              - 'internal/retrieval/**'
              - 'internal/storage/**'

  # ----------------------------------------------------------------
  # Round-14 Task 15: the legacy `fast-go` job ran gofmt + vet +
  # test + build serially in one runner. The unit-test step was the
  # long pole, so we split it into three parallel jobs:
  #   fast-check  — gofmt + go vet (~10s).
  #   fast-test   — go test -race -cover (the long pole).
  #   fast-build  — go build of the two cmd/ binaries.
  # The aggregator (fast-required) waits on all three plus the
  # existing fast-lint / fast-eval / fast-alerts surfaces.
  #
  # Round-14 Task 16: each job restores ~/.cache/go-build via the
  # setup-go action's built-in cache; we additionally pin an
  # actions/cache step on the same paths so the build cache
  # survives across branches that don't share a go.sum hash.
  # ----------------------------------------------------------------

  fast-check:
    name: Fast Go check (gofmt + vet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Restore Go build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
          # Round-22 fix: job-specific primary key so each job
          # saves a *complete* cache containing the artifacts it
          # built. The shared `go-build-` prefix is kept as a
          # restore-key so any job can still prime a cold cache
          # for the others on first run.
          key: ${{ runner.os }}-go-build-check-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-build-check-
            ${{ runner.os }}-go-build-

      - name: go mod download
        run: go mod download

      - name: gofmt check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error title=gofmt::Files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

  fast-test:
    name: Fast Go test (race + cover)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Restore Go build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
          # Round-22 fix: job-specific primary, shared restore-key.
          key: ${{ runner.os }}-go-build-test-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-build-test-
            ${{ runner.os }}-go-build-

      - name: go mod download
        run: go mod download

      - name: go test -race -cover
        run: go test -race -cover -count=1 ./...

  fast-build:
    name: Fast Go build (cmd/ binaries)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Restore Go build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
          # Round-22 fix: job-specific primary, shared restore-key.
          key: ${{ runner.os }}-go-build-build-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-build-build-
            ${{ runner.os }}-go-build-

      - name: go mod download
        run: go mod download

      - name: build binaries
        run: |
          mkdir -p bin
          go build -o bin/context-engine-ingest ./cmd/ingest
          go build -o bin/context-engine-api    ./cmd/api

  # ----------------------------------------------------------------
  # Round-15 Task 14: fast-connector-unit narrows the race-tested
  # surface to `internal/connector/...` so connector-only PRs get
  # a sub-30s feedback loop. The job still runs in parallel with
  # fast-test (which covers the full module) — callers wanting
  # connector-scoped CI can rely on this job alone.
  # ----------------------------------------------------------------
  fast-connector-unit:
    name: Fast Go test (connector unit)
    runs-on: ubuntu-latest
    # Round-20/21 Task 24: skip on PRs that don't touch the
    # connector surface. Push-to-main / nightly / dispatch still
    # run unconditionally (detect-changes returns `true`).
    needs: [detect-changes]
    if: |
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.connector == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Restore Go build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
          # Round-22 fix: job-specific primary so each lane
          # saves a *complete* cache of its own artifacts; the
          # shared `go-build-` prefix is the restore-key so any
          # job can prime a cold cache for the others.
          key: ${{ runner.os }}-go-build-connector-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-build-connector-
            ${{ runner.os }}-go-build-

      - name: go mod download
        run: go mod download

      - name: time go test connectors only
        run: time go test -race -count=1 ./internal/connector/...

  # ----------------------------------------------------------------
  # Round-16 Task 14: fast-connector-integration runs the
  # `integration`-tagged connector contract tests in
  # tests/integration/connector_contract_test.go. The job filters
  # to `TestConnectorContract` so it does NOT block on
  # docker-compose-backed integration tests (Qdrant / docling /
  # embedding) — those still live in the full lane.
  # ----------------------------------------------------------------
  fast-connector-integration:
    name: Fast Go test (connector contracts, integration tag)
    runs-on: ubuntu-latest
    # Round-20/21 Task 24: skip on PRs that don't touch the
    # connector surface.
    needs: [detect-changes]
    if: |
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.connector == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Restore Go build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
          # Round-22 fix: job-specific primary, shared restore-key.
          key: ${{ runner.os }}-go-build-conn-integ-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-build-conn-integ-
            ${{ runner.os }}-go-build-

      - name: go mod download
        run: go mod download

      - name: connector contract tests
        run: go test -race -count=1 -tags=integration ./tests/integration/... -run TestConnectorContract

  # ----------------------------------------------------------------
  # Round-16 Task 14: fast-regression pins the regression manifests
  # (rounds 4 → 16) as a fast-lane gate. Each manifest entry is
  # cheap (no external services) but the meta-tests ensure every
  # documented bug retains its corresponding regression test.
  # ----------------------------------------------------------------
  fast-regression:
    name: Fast Go test (regression manifests)
    runs-on: ubuntu-latest
    # Round-20/21 Task 24: skip on PRs that don't touch the
    # regression surface.
    needs: [detect-changes]
    if: |
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.regression == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Restore Go build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
          # Round-22 fix: job-specific primary, shared restore-key.
          key: ${{ runner.os }}-go-build-regression-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-build-regression-
            ${{ runner.os }}-go-build-

      - name: go mod download
        run: go mod download

      - name: regression manifests
        run: go test -race -count=1 ./tests/regression/...

  fast-lint:
    # Round-13 Task 0: golangci-lint runs in parallel with the
    # race+cover suite. The action restores its own analysis
    # cache via the `go-version` setup-go cache; total wall time
    # is now dominated by the longer of the two jobs.
    name: Fast golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: go mod download
        run: go mod download

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.5.0
          args: --timeout=5m

  fast-eval:
    name: Fast Eval (retrieval golden corpus)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: go mod download
        run: go mod download

      - name: Eval gate
        run: make eval

  fast-alerts:
    name: Fast alerts.yaml check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: go mod download
        run: go mod download

      - name: alerts-check
        run: make alerts-check

  fast-rollback-parity:
    name: Fast migration/rollback parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: go mod download
        run: go mod download

      - name: rollback parity tests
        run: go test -race -count=1 ./migrations/rollback/...

  fast-migrate-dry-run:
    # Round-12 Task 9: drive the migration runner in DryRun mode
    # against an ephemeral SQLite database so SQL syntax errors in
    # new migrations surface at PR time, not deploy time.
    name: Fast migrate-dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: go mod download
        run: go mod download

      - name: migrate-dry-run
        run: make migrate-dry-run

  fast-proto-check:
    name: Fast — proto-check (no codegen drift)
    # Round-10 Task 17: pin the proto-gen output as a fast-lane
    # gate. proto-check runs proto-gen and fails when the working
    # tree diverges from the committed stubs, so every PR is
    # required to keep proto/ in sync.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Install protoc
        env:
          PROTOC_VERSION: "25.3"
        run: |
          curl -sSLo /tmp/protoc.zip "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          sudo unzip -q -o /tmp/protoc.zip -d /usr/local
          protoc --version

      - name: proto-check
        run: make proto-check

  # Round-18 Task 20 — dependency CVE scan. `govulncheck` queries
  # the Go vulnerability database and reports advisories whose
  # affected symbols our package set actually calls. We install
  # the binary fresh per run (cheap) so we always get the latest
  # advisory data.
  fast-govulncheck:
    name: Fast — govulncheck (deps CVE scan)
    runs-on: ubuntu-latest
    # Soft-fail: stdlib CVEs are patched in tagged Go point
    # releases that we follow on a slower cadence; gating the
    # PR on every stdlib advisory would block unrelated work.
    # The job still posts the report; an operator review
    # cadence runs alongside `make vulncheck`.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  # Round-18 Task 19 — pull the OpenAPI router-coverage test out
  # of fast-test into its own micro-lane. The test is a 1-2s
  # walk of the gin engine versus docs/openapi.yaml, so isolating
  # it removes a long-tail cause of "is fast-test red because of
  # docs or because of code?" triage time.
  fast-openapi:
    name: Fast — OpenAPI router coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: OpenAPI coverage test
        run: go test -race -count=1 ./docs/...

  fast-python:
    name: Fast Python services unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install proto / test deps
        run: |
          python -m pip install --upgrade pip
          pip install grpcio==1.80.0 grpcio-tools==1.80.0 grpcio-health-checking==1.80.0 "protobuf>=6,<8" pytest "prometheus-client>=0.21,<1"

      - name: Generate Python proto stubs
        run: bash services/gen_protos.sh

      - name: Run unit tests
        run: cd services && python -m pytest -q --import-mode=importlib

  # Aggregator: branch protection should require this single check.
  # When you add a new fast-lane job, add it to `needs:` here.
  fast-required:
    name: Required CI (fast lane)
    runs-on: ubuntu-latest
    needs: [detect-changes, fast-check, fast-test, fast-build, fast-connector-unit, fast-connector-integration, fast-regression, fast-lint, fast-eval, fast-alerts, fast-rollback-parity, fast-migrate-dry-run, fast-proto-check, fast-openapi, fast-python]
    if: always()
    steps:
      - name: Verify fast-lane jobs passed
        run: |
          set -e
          fail=0
          # fast-govulncheck is intentionally decoupled from this
          # gate: it runs in soft-fail mode (continue-on-error:
          # true on the job) so an upstream stdlib advisory
          # doesn't block PRs, and it is not listed in `needs:`
          # above so this required check doesn't wait on it. The
          # report is still surfaced in the Actions tab.
          #
          # Round-22 Devin Review fix: detect-changes is the
          # upstream of every path-filtered job — if it fails or
          # is cancelled, the downstream lanes resolve to
          # `skipped` (because their `needs:` dependency failed),
          # and the loop below would incorrectly let that pass.
          # We therefore demand `detect-changes == success`
          # explicitly before evaluating the path-filtered set.
          dc="${{ needs.detect-changes.result }}"
          if [ "$dc" != "success" ]; then
            echo "::error::detect-changes job did not succeed (result=$dc); path-filtered jobs may have been masked as skipped"
            exit 1
          fi
          #
          # Round-20/21 Task 24: path-filtered jobs may evaluate
          # to `skipped` when a PR doesn't touch their surface.
          # The aggregator must treat `skipped` and `success` as
          # equivalent passing results for path-filtered jobs so
          # branch protection does not block doc-only / unrelated
          # PRs.
          for r in \
            "${{ needs.fast-check.result }}" \
            "${{ needs.fast-test.result }}" \
            "${{ needs.fast-build.result }}" \
            "${{ needs.fast-connector-unit.result }}" \
            "${{ needs.fast-connector-integration.result }}" \
            "${{ needs.fast-regression.result }}" \
            "${{ needs.fast-lint.result }}" \
            "${{ needs.fast-eval.result }}" \
            "${{ needs.fast-alerts.result }}" \
            "${{ needs.fast-rollback-parity.result }}" \
            "${{ needs.fast-migrate-dry-run.result }}" \
            "${{ needs.fast-proto-check.result }}" \
            "${{ needs.fast-openapi.result }}" \
            "${{ needs.fast-python.result }}"; do
            if [ "$r" != "success" ] && [ "$r" != "skipped" ]; then
              fail=1
            fi
          done
          if [ "$fail" = "1" ]; then
            echo "::error::fast-check=${{ needs.fast-check.result }} fast-test=${{ needs.fast-test.result }} fast-build=${{ needs.fast-build.result }} fast-connector-unit=${{ needs.fast-connector-unit.result }} fast-connector-integration=${{ needs.fast-connector-integration.result }} fast-regression=${{ needs.fast-regression.result }} fast-lint=${{ needs.fast-lint.result }} fast-eval=${{ needs.fast-eval.result }} fast-alerts=${{ needs.fast-alerts.result }} fast-rollback-parity=${{ needs.fast-rollback-parity.result }} fast-migrate-dry-run=${{ needs.fast-migrate-dry-run.result }} fast-proto-check=${{ needs.fast-proto-check.result }} fast-openapi=${{ needs.fast-openapi.result }} fast-python=${{ needs.fast-python.result }}"
            exit 1
          fi
          echo "fast lane green"

  # ===============================================================
  # Full lane — gated; only runs on push-to-main, the `full-ci`
  # label, the nightly cron, or workflow_dispatch
  # ===============================================================

  full-proto-gen:
    name: Full — proto-gen check
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'full-ci'))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Install protoc
        env:
          PROTOC_VERSION: "25.3"
        run: |
          curl -sSLo /tmp/protoc.zip "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          sudo unzip -q -o /tmp/protoc.zip -d /usr/local
          protoc --version

      - name: proto-gen check
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          export PATH="$PATH:$(go env GOPATH)/bin"
          for f in $(find proto -name '*.proto'); do
            protoc \
              --proto_path=proto \
              --go_out=proto --go_opt=paths=source_relative \
              --go-grpc_out=proto --go-grpc_opt=paths=source_relative \
              "$f"
          done
          if ! git diff --exit-code -- proto; then
            echo "::error title=stale proto::Generated proto files are out of date. Run 'make proto-gen' and commit."
            exit 1
          fi

  full-e2e:
    name: Full — e2e smoke
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'full-ci'))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      # Round-14 Task 16 — Buildx caches per-image layers. The
      # subsequent `docker compose up` re-uses pulled-image layers
      # across runs when the compose definitions are stable.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Bring up storage plane
        run: docker compose up -d --wait

      - name: Wait for stack to settle
        # Round-20 Task 22: tighten the readiness gate so it also
        # checks Kafka + Redis alongside Qdrant and Postgres. The
        # explicit healthcheck directives added in docker-compose.yml
        # make `docker compose ps --filter "health=healthy"` reliable,
        # but we keep the per-service curl/pg_isready/redis-cli
        # checks here so a CI failure surfaces *which* service is
        # not ready without scrolling through `docker compose ps`.
        run: |
          PG_CID=$(docker ps -qf name=hunting-fishball-postgres)
          REDIS_CID=$(docker ps -qf name=hunting-fishball-redis)
          KAFKA_CID=$(docker ps -qf name=hunting-fishball-kafka)
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:6333/healthz >/dev/null && \
               docker exec "$PG_CID" pg_isready -U hf -d hunting_fishball >/dev/null 2>&1 && \
               docker exec "$REDIS_CID" redis-cli ping 2>/dev/null | grep -q PONG && \
               docker exec "$KAFKA_CID" kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1; then
              echo "stack ready"; exit 0
            fi
            echo "waiting for stack... ($i/30)"; sleep 2
          done
          echo "stack did not become ready in time"
          docker compose ps
          exit 1

      - name: Run e2e smoke test
        env:
          E2E_ENABLED: "1"
          CONTEXT_ENGINE_DATABASE_URL: "host=localhost user=hf password=hf dbname=hunting_fishball port=5432 sslmode=disable"
          CONTEXT_ENGINE_QDRANT_URL: "http://localhost:6333"
        run: go test -tags=e2e -race -count=1 -timeout 5m ./tests/e2e/...

      # Round-12 Task 7: tenant isolation smoke runs against the
      # live storage plane brought up above. Kept as a discrete
      # step so a failure here surfaces as "isolation regression"
      # rather than getting buried in the generic e2e suite.
      - name: Tenant isolation smoke
        env:
          E2E_ENABLED: "1"
          CONTEXT_ENGINE_DATABASE_URL: "host=localhost user=hf password=hf dbname=hunting_fishball port=5432 sslmode=disable"
          CONTEXT_ENGINE_QDRANT_URL: "http://localhost:6333"
        run: make test-isolation

      - name: Tear down storage plane
        if: always()
        run: docker compose down -v

  full-integration:
    name: Full — Go ↔ Python integration
    runs-on: ubuntu-latest
    needs: fast-python
    # Heavy ML image builds (Docling ~3 GB, sentence-transformers
    # +torch ~2 GB) and Mem0's external LLM dependency mean this job
    # can flake on the default GitHub-hosted runners. Treat it as a
    # signal job (continue-on-error) until we move it onto a self-
    # hosted runner with a warm image cache and an OPENAI_API_KEY.
    continue-on-error: true
    if: |
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && (
        contains(github.event.pull_request.labels.*.name, 'full-ci') ||
        contains(github.event.pull_request.labels.*.name, 'run-integration')
      ))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Build & start ML services
        run: |
          docker compose build docling embedding memory
          docker compose up -d --wait docling embedding memory falkordb

      - name: Wait for gRPC services
        run: |
          for port in 50051 50052 50053; do
            for i in $(seq 1 60); do
              if (echo > /dev/tcp/localhost/$port) >/dev/null 2>&1; then
                echo "port $port ready"; break
              fi
              echo "waiting for port $port... ($i/60)"; sleep 2
              if [ "$i" = "60" ]; then echo "port $port did not open"; exit 1; fi
            done
          done

      - name: Run Go integration tests
        env:
          DOCLING_TARGET: "localhost:50051"
          EMBEDDING_TARGET: "localhost:50052"
          MEMORY_TARGET: "localhost:50053"
          FALKORDB_ADDR: "localhost:6380"
        run: go test -tags=integration -race -count=1 -timeout 10m ./tests/integration/...

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ===============================================================
  # Round-10 Task 17: nightly-only heavy jobs. Each runs against
  # `schedule` and `workflow_dispatch`; PRs can opt in via the
  # `full-ci` label.
  # ===============================================================

  full-connector-smoke:
    name: Full — connector smoke
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'full-ci'))
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - name: go mod download
        run: go mod download
      - name: connector smoke
        run: make test-connector-smoke

  full-bench-e2e:
    name: Full — end-to-end P95 bench
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'full-ci'))
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - name: go mod download
        run: go mod download
      - name: bench-e2e
        run: make bench-e2e

  full-capacity-test:
    name: Full — capacity test
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'full-ci'))
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - name: go mod download
        run: go mod download
      - name: capacity test
        run: make capacity-test

  # Round-13 Task 20: dialect-aware migration dry-run.
  full-migrate-dry-run-pg:
    name: Full — migrate-dry-run-pg
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'full-ci'))
    steps:
      - uses: actions/checkout@v4
      - name: migrate-dry-run-pg
        run: make migrate-dry-run-pg

  nightly-fuzz:
    name: Nightly — fuzz targets
    runs-on: ubuntu-latest
    # Fuzzing is wall-clock-heavy: 30s per target × N targets. Limit
    # to nightly cron + workflow_dispatch; PRs that need it can fire
    # workflow_dispatch by hand.
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - name: go mod download
        run: go mod download
      - name: make fuzz
        run: make fuzz
