version: "3.9"

# Local development storage plane for hunting-fishball.
# Bring up:        docker compose up -d
# Tear down:       docker compose down
# Wipe state:      docker compose down -v
#
# Services:
#   - postgres  : metadata, audit log, policy
#   - redis     : semantic cache / rate limit / locks
#   - kafka     : pipeline events, audit outbox (KRaft single-node)
#   - qdrant    : vector store (per-tenant collections)
#   - falkordb  : graph traversal (Phase 3, Redis-protocol-compatible)
#   - docling   : Python gRPC parser (Phase 3 Stage 2)
#   - embedding : Python gRPC sentence-transformers (Phase 3 Stage 3)
#   - memory    : Python gRPC Mem0 (Phase 3 retrieval backend)

name: hunting-fishball

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hf
      POSTGRES_PASSWORD: hf
      POSTGRES_DB: hunting_fishball
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hf -d hunting_fishball"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: bitnamilegacy/kafka:3.7
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      # KRaft mode — no Zookeeper.
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka_data:/bitnami/kafka
    # Round-20 Task 22: explicit Kafka healthcheck. The bitnami
    # image ships kafka-broker-api-versions.sh which only returns
    # 0 once the broker has fully advertised its listeners — the
    # required state for producer/consumer connect.
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:v1.10.1
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    # Round-20 Task 22: probe Qdrant's /readyz once the HTTP
    # listener is up. Qdrant ships /healthz (liveness, always
    # 200) and /readyz (readiness, blocks until WAL replay
    # finishes) — we want readiness so the api container's
    # depends_on:condition: service_healthy actually waits.
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  # FalkorDB exposes the Redis wire protocol with the GRAPH.* command
  # family. We bind it to host port 6380 so it doesn't collide with
  # the cache Redis on 6379.
  falkordb:
    image: falkordb/falkordb:edge
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - falkordb_data:/var/lib/falkordb/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  docling:
    build:
      context: .
      dockerfile: services/docling/Dockerfile
    restart: unless-stopped
    ports:
      - "50051:50051"
    environment:
      DOCLING_ADDR: "[::]:50051"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1', 50051), timeout=2).close()"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  embedding:
    build:
      context: .
      dockerfile: services/embedding/Dockerfile
    restart: unless-stopped
    ports:
      - "50052:50052"
    environment:
      EMBEDDING_ADDR: "[::]:50052"
      EMBEDDING_MODEL: "sentence-transformers/all-MiniLM-L6-v2"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1', 50052), timeout=2).close()"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  memory:
    build:
      context: .
      dockerfile: services/memory/Dockerfile
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_started
    ports:
      - "50053:50053"
    environment:
      MEMORY_ADDR: "[::]:50053"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1', 50053), timeout=2).close()"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  graphrag:
    build:
      context: .
      dockerfile: services/graphrag/Dockerfile
    restart: unless-stopped
    ports:
      - "50054:50054"
    environment:
      GRAPHRAG_ADDR: "[::]:50054"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1', 50054), timeout=2).close()"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  qdrant_data:
  falkordb_data:
